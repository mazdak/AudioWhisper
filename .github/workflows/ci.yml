name: CI

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        run: |
          # Prefer newer Xcode versions for latest Swift/SDK support
          if [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          else
            echo "Using default Xcode"
            xcode-select -p
          fi

      - name: Show Swift Version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Run Tests
        run: |
          # Run tests and filter out macOS system framework noise
          # Use a temp file to preserve exit code while filtering output
          set +e
          swift test --parallel 2>&1 | tee /tmp/test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          # Filter and display cleaned output
          grep -v -E "(CNAccountCollection|ContactsPersistence|com\.apple\.contacts|NSXPCConnection|DetachedSignatures|FrontBoardServices|NSStatusItemScene|BSBlockSentinel|NSStatusItem|assertOnQueue)" /tmp/test_output.txt || true
          exit $TEST_EXIT_CODE
        env:
          OS_ACTIVITY_MODE: disable

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for debug print statements
        run: |
          echo "Checking for print statements in Swift source files..."
          # Find print statements but exclude comments and Python files
          if grep -rn "print(" Sources/ --include="*.swift" | grep -v "//.*print" | grep -v "\.py:"; then
            echo "::warning::Found print statements that may need review"
          else
            echo "No problematic print statements found"
          fi

      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -rn "TODO\|FIXME" Sources/ --include="*.swift" || echo "No TODO/FIXME comments found"
