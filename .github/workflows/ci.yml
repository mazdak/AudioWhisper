name: CI

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        run: |
          # Prefer newer Xcode versions for latest Swift/SDK support
          if [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          else
            echo "Using default Xcode"
            xcode-select -p
          fi

      - name: Show Swift Version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Run Tests
        run: |
          # Run tests and filter out macOS system framework noise
          # Use a temp file to preserve exit code while filtering output
          set +e
          swift test --parallel --enable-code-coverage 2>&1 | tee /tmp/test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          # Filter and display cleaned output
          grep -v -E "(CNAccountCollection|ContactsPersistence|com\.apple\.contacts|NSXPCConnection|DetachedSignatures|FrontBoardServices|NSStatusItemScene|BSBlockSentinel|NSStatusItem|assertOnQueue)" /tmp/test_output.txt || true
          exit $TEST_EXIT_CODE
        env:
          OS_ACTIVITY_MODE: disable

      - name: Coverage summary
        if: always()
        run: |
          set +e
          PROFDATA=$(find .build -name '*.profdata' | head -n 1)
          BIN_DIR=$(find .build -type d -name '*.xctest' | head -n 1)
          if [ -n "$PROFDATA" ] && [ -n "$BIN_DIR" ]; then
            BIN=$(find "$BIN_DIR/Contents/MacOS" -type f | head -n 1)
            xcrun llvm-cov report "$BIN" -instr-profile "$PROFDATA" 2>/dev/null | tail -n 1 || true
          else
            echo "No coverage data found"
          fi

      - name: Coverage threshold gate
        if: always()
        run: |
          set +e
          PROFDATA=$(find .build -name '*.profdata' | head -n 1)
          BIN_DIR=$(find .build -type d -name '*.xctest' | head -n 1)
          if [ -z "$PROFDATA" ] || [ -z "$BIN_DIR" ]; then
            echo "No coverage data — skipping threshold check"
            exit 0
          fi
          BIN=$(find "$BIN_DIR/Contents/MacOS" -type f | head -n 1)
          # Pull the line-coverage percentage from the TOTAL line
          PCT=$(xcrun llvm-cov report "$BIN" -instr-profile "$PROFDATA" 2>/dev/null | tail -n 1 | awk '{print $(NF-1)}' | tr -d '%')
          if [ -z "$PCT" ]; then
            echo "Could not parse coverage percent; skipping"
            exit 0
          fi
          echo "Line coverage: $PCT%"
          THRESHOLD=60
          # bash's [ ] doesn't do float comparison; cast to int for the check
          PCT_INT=${PCT%.*}
          if [ "$PCT_INT" -lt "$THRESHOLD" ]; then
            echo "::error::Line coverage $PCT% below threshold $THRESHOLD%"
            exit 1
          fi
          echo "Coverage $PCT% >= threshold $THRESHOLD%"

  lint:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint --strict --reporter github-actions-logging

      - name: No print() outside #if DEBUG
        run: |
          set -e
          violations=$(grep -rn --include='*.swift' -E '^\s*print\(' Sources/ | grep -v '//.*print' || true)
          # Filter out lines that appear inside a #if DEBUG block by checking surrounding lines
          if [ -n "$violations" ]; then
            echo "$violations" | while IFS=: read -r file line _rest; do
              # Search 50 lines back for #if DEBUG, then check if a #endif came between
              ctx=$(sed -n "1,${line}p" "$file" | tail -n 50)
              last_debug=$(echo "$ctx" | grep -n '#if DEBUG' | tail -n 1 | cut -d: -f1 || true)
              last_endif=$(echo "$ctx" | grep -n '#endif' | tail -n 1 | cut -d: -f1 || true)
              if [ -z "$last_debug" ] || { [ -n "$last_endif" ] && [ "$last_endif" -gt "$last_debug" ]; }; then
                echo "::error file=$file,line=$line::print() outside #if DEBUG"
                exit 1
              fi
            done
          fi
          echo "No production print() found"

      - name: TODO/FIXME audit (warn only)
        run: |
          grep -rn "TODO\|FIXME" Sources/ --include='*.swift' || echo "No TODO/FIXME comments found"
