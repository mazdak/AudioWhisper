name: Build and Test

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Show Swift Version
      run: swift --version

    - name: Build
      run: swift build

    - name: Run Tests
      run: swift test --parallel
      env:
        OS_ACTIVITY_MODE: disable

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for common issues
      run: |
        echo "Checking for print statements in Swift files..."
        ! grep -r "print(" Sources/*.swift --include="*.swift" | grep -v "// print" | grep -v ".py:" || echo "Found print statements (review needed)"

        echo "Checking for force unwraps..."
        ! grep -rn "![^=]" Sources/ --include="*.swift" | grep -v "!=" | grep -v "!//" | grep -v "@IBAction" | grep -v "@IBOutlet" || echo "Found potential force unwraps (review needed)"
